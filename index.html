<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <title> Hossam - مطور برمجيات</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            direction: rtl;
            background: #0f172a;
            color: white;
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Navbar */
        nav {
            background: #1e293b;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
        }

        /* Header */
        header {
            text-align: center;
            padding: 60px;
            background: linear-gradient(135deg, #2563eb, #06b6d4);
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        /* Cards */
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            transition: 0.3s;
            text-decoration: none;
            color: white;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-8px);
            background: #334155;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            background: #1e293b;
            margin-top: 20px;
        }
    </style>

</head>

<body>

        </div>
    </nav>

        <p>أصمم وأطور مواقع وتطبيقات احترافية</p>
    </header>

    <!-- SERVICES -->
    <div class="grid">

        <a class="card" href="web.html">

        </a>

        </a>

        </a>

        <a class="card" href="seo.html">

        <a class="card" href="contact.html">

    </footer>

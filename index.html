<style>
body{
    margin:0;

    direction:rtl;

/* Navbar */
nav{
    position:fixed;
    top:0;
    width:100%;
    background:#111a2e;
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
}

nav a{
    color:white;
    text-decoration:none;

/* Hero */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.hero h1{
    font-size:40px;
}

.hero p{
    opacity:0.9;
}

/* Grid */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:60px;
    max-width:1100px;
    margin:auto;
}

/* Card */
.card{
    background:#111a2e;
    padding:25px;
    border-radius:12px;
    text-align:center;
    transition:0.3s;
    text-decoration:none;
    color:white;
    display:block;
}

.card:hover{
    transform:translateY(-8px);
    background:#1c2a4a;
}

/* Footer */
footer{
    text-align:center;
    padding:20px;
    background:#111a2e;
}

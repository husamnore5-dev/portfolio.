*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
}

body{
    font-family:'Cairo', sans-serif;
    background:#0b1220;
    color:white;
}

/* NAV */
nav{
    position:fixed;
    width:100%;
    top:0;
    background:rgba(17,26,46,0.95);
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    z-index:1000;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.hero h1{font-size:45px;}
.hero p{opacity:0.9;margin-top:10px;}

.btn{
    margin-top:20px;
    padding:10px 25px;
    background:#111a2e;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

/* SECTIONS */
section{
    padding:80px 20px;
    max-width:1100px;
    margin:auto;
}

h2{
    color:#38bdf8;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

/* CARD */
.card{
    display:block;
    text-decoration:none;
    color:white;
    background:#111a2e;
    padding:25px;
    border-radius:12px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
    background:#1c2a4a;
}

/* CONTACT */
.contact{
    background:#111a2e;
    padding:30px;
    border-radius:12px;
    text-align:center;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:#111a2e;
}

/* WHATSAPP */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25d366;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
    color:white;
    font-size:20px;
}

/* CV BUTTON */
.cv{
    margin-top:15px;
    display:inline-block;
    padding:10px 20px;
    background:#38bdf8;
    color:#000;
    border-radius:8px;
    text-decoration:none;
}
</style>

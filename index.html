.grid{

    padding:25px;
    border-radius:12px;
    text-align:center;
    text-decoration:none;
    color:white;
    transition:0.3s;
    cursor:pointer;
}

.card:hover{
    transform:translateY(-8px);
    background:#1c2a4a;
}

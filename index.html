<title>Hossam | Developer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
}

body{
    font-family:Arial;
    background:#0b1220;
    color:white;
}

/* NAV */
nav{
    position:fixed;
    top:0;
    width:100%;
    background:#111a2e;
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    z-index:1000;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 10px;
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.hero h1{
    font-size:45px;
}

.hero p{
    opacity:0.9;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:60px;
    max-width:1100px;
    margin:auto;
}

/* CARD */
.card{
    display:block;
    background:#111a2e;
    padding:25px;
    border-radius:12px;
    text-align:center;
    text-decoration:none;
    color:white;
    transition:0.4s;
    position:relative;
    overflow:hidden;
}

/* HOVER EFFECT */
.card:hover{
    transform:translateY(-10px);
    background:#1c2a4a;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* glow effect */
.card::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(90deg,transparent,#38bdf8,transparent);
    top:0;
    left:-100%;
    transition:0.5s;
}

.card:hover::before{
    left:100%;
}

/* WHATSAPP */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25d366;
    padding:15px;
    border-radius:50%;
    text-decoration:none;
    color:white;
    font-size:20px;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:#111a2e;
}
</style>

</head>
